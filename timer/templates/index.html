<!DOCTYPE html>
<html>
<head>
    <title>番茄鐘</title>
    <style>
        body { font-family: Arial; text-align: center; padding-top: 50px; background: #fff5f5; }
        .timer-box { font-size: 80px; color: #e74c3c; font-weight: bold; margin: 20px; }
        button { padding: 10px 20px; font-size: 18px; cursor: pointer; background: #e74c3c; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>🍅 專注番茄鐘</h1>
    <div class="timer-box" id="display">25:00</div>
    <button onclick="startTimer()">開始計時</button>
    <p>今日累計完成：<span id="count">{{ count }}</span> 次</p>

    <script>
        let seconds = 1500; // 25分鐘
        function startTimer() {
            const interval = setInterval(() => {
                seconds--;
                updateUI();
                if (seconds <= 0) {
                    clearInterval(interval);
                    alert("太棒了！完成一次專注！");
                    saveToDB();
                    seconds = 1500;
                    updateUI();
                }
            }, 1000);
        }

        function updateUI() {
            let m = Math.floor(seconds / 60);
            let s = seconds % 60;
            document.getElementById('display').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function saveToDB() {
            fetch('/update/', {
                method: 'POST',
                headers: { 'X-CSRFToken': '{{ csrf_token }}' }
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById('count').innerText = data.new_count;
            });
        }
    </script>
</body>
</html>
