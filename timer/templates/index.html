<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>番茄鐘 - 暫停功能版</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #fce4e4; padding-top: 50px; }
        #timer { font-size: 100px; color: #d32f2f; margin: 30px; font-weight: bold; }
        .controls button { font-size: 18px; padding: 10px 25px; cursor: pointer; border-radius: 8px; border: none; margin: 5px; }
        .btn-start { background: #27ae60; color: white; }
        .btn-pause { background: #f39c12; color: white; }
        .btn-reset { background: #7f8c8d; color: white; }
    </style>
</head>
<body>
    <h1>🍅 專注番茄鐘</h1>
    <div id="timer">25:00</div>
    
    <div class="controls">
        <button id="mainBtn" class="btn-start" onclick="toggleTimer()">開始計時</button>
        <button class="btn-reset" onclick="resetTimer()">重置</button>
    </div>

    <p>今日已完成：<span id="countDisplay">{{ count }}</span> 次</p>

    <script>
        let timeLeft = 1500; // 25 分鐘
        let timerInterval = null;
        let isRunning = false;

        function toggleTimer() {
            const btn = document.getElementById('mainBtn');
            
            if (!isRunning) {
                // 開始或恢復計時
                isRunning = true;
                btn.innerText = "暫停計時";
                btn.className = "btn-pause";
                
                timerInterval = setInterval(() => {
                    if (timeLeft <= 0) {
                        finishTimer();
                    } else {
                        timeLeft--;
                        updateUI();
                    }
                }, 1000);
            } else {
                // 暫停計時
                pauseTimer();
            }
        }

        function pauseTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            const btn = document.getElementById('mainBtn');
            btn.innerText = "繼續計時";
            btn.className = "btn-start";
        }

        function resetTimer() {
            pauseTimer();
            timeLeft = 1500;
            updateUI();
            const btn = document.getElementById('mainBtn');
            btn.innerText = "開始計時";
        }

        function updateUI() {
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            document.getElementById('timer').innerText = 
                `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }

        function finishTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            alert("專注結束！辛苦了！");
            saveData();
            timeLeft = 1500;
            updateUI();
            document.getElementById('mainBtn').innerText = "開始計時";
        }

        function saveData() {
            fetch('/update/', {
                method: 'POST',
                headers: { 'X-CSRFToken': '{{ csrf_token }}' }
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById('countDisplay').innerText = data.new_count;
            });
        }
    </script>
</body>
</html>
